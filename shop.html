<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

/* HEADER */
header{
    background:black;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header nav a{
    color:white;
    margin-left:15px;
    text-decoration:none;
}

.hero{
    background:#222;
    color:white;
    text-align:center;
    padding:60px 20px;
}

.products{
    padding:40px;
}

.products h2{
    margin-bottom:20px;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    margin-top:10px;
}

.card p{
    margin:10px 0;
    font-weight:bold;
}

button{
    padding:10px 15px;
    border:none;
    background:black;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#444;
}

/* CART */
.cart{
    background:white;
    margin:40px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.cart h2{
    margin-bottom:15px;
}


#cart-items li{
    margin-bottom:10px;
}

.receipt{
    margin-top:20px;
    padding:15px;
    background:#eee;
    border-radius:10px;
}

footer{
    background:black;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}

</style>

<section class="cart">
    <h2>Shopping Cart</h2>

    <ul id="cart-items"></ul>

    <h3>Total: ₱<span id="total">0</span></h3>

    <button onclick="generateReceipt()">
        Generate Receipt
    </button>

    <div class="receipt" id="receipt">
        <h2>Receipt</h2>
        <div id="receipt-content"></div>
    </div>
</section>

<footer>
    <p>© 2026 Npa's Clothing. All Rights Reserved.</p>
</footer>

<script>
let cart = [];
let total = 0;

function addToCart(product, price){

    cart.push({product, price});

    total += price;

    displayCart();
}

function displayCart(){

    const cartItems = document.getElementById("cart-items");

    cartItems.innerHTML = "";

    cart.forEach(item => {

        const li = document.createElement("li");

        li.textContent =
            item.product + " - ₱" + item.price.toLocaleString();

        cartItems.appendChild(li);
    });

    document.getElementById("total").textContent = total.toLocaleString();
}

function generateReceipt(){

    let receiptHTML = "";

    cart.forEach((item, index) => {

        receiptHTML += `
            <div style="margin-bottom:10px;">
                <p>
                    ${item.product} - ₱${item.price.toLocaleString()}
                </p>

                <button onclick="removeFromReceipt(${index})">
                    Remove
                </button>
            </div>
        `;
    });

    receiptHTML += `
        <hr>
        <h3>Total: ₱${total.toLocaleString()}</h3>
    `;

    document.getElementById("receipt-content").innerHTML =
        receiptHTML;
}

function removeFromReceipt(index){

    total -= cart[index].price;

    cart.splice(index, 1);

    displayCart();

    generateReceipt();
}


</script>
